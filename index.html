<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congresso 2021</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header>
        <div class="abqm-logo-container">
            <img class="abqm-logo" src="./img/abqm-logo.png" alt="Logo da ABQM">
        </div>
        <div class="navbar">
            <div class="side-buttons-container">
                <button class="side-button">PROVAS</button>
                <button class="side-button">NOTÍCIAS</button>
                <button class="side-button">SALA DE IMPRENSA</button>
                <button class="side-button">CAMPEÕES</button>
                <button class="side-button">PORTAL ABQM</button>
            </div>
            <div class="congresso-logo-container">
                <img class="congresso-logo" src="./img//congresso-logo.png" alt="Logo do Congresso">
            </div>
        </div>
    </header>

    <main>
        <div class="menu-buttons-container">
            <button class="menu-button">INSCRIÇÕES</button>
            <button class="menu-button">CIRCULAR</button>
            <button class="menu-button">PROGRAMAÇÃO</button>
            <button class="menu-button">INSCRIÇÃO E PREMIAÇÃO</button>
            <button class="menu-button">HABILITADOS</button>
        </div>
        <div class="news-container">
            <h2>ACOMPANHE AS PROVAS</h2>
            <h2 class="live-text">AO VIVO</h2>
            <div class="video"></div>
        </div>
        <h2 class="last-news-text">ÚLTIMAS NOTÍCIAS</h3>
        <div class="last-news-container">
            <div class="last-news"></div>
            <div class="last-news"></div>
        </div>
    </main>
    
    <footer>
        <div>

        </div>
        <div>
            
        </div>

    </footer>
</body>
</html>
